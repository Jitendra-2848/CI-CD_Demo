name: Manual Trigger with Params

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Name of the person to greet'
        required: true
        type: string
      greeting:
        description: 'Type of greeting'
        required: true
        type: string
      data:
        description: 'content of a file'
        required: false
        type: string

jobs:
  greet:
    runs-on: ubuntu-latest
    steps:
      - name: File Content
        run: echo "${{ inputs.data }}"
      - name: Greeting 
        run: echo "${{ inputs.greeting }} to ${{ inputs.name }}"
      - name: Name
        run: echo "${{ inputs.name }},how are you ?"