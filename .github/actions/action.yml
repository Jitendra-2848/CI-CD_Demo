name: "My Composite Action"
description: "Install, build and test Bun project"

runs:
  using: "composite"

  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@v1

    - name: Install dependencies
      run: bun install
      shell: bash

    - name: Build project (optional)
      run: bun run build || echo "No build script found, skipping"
      shell: bash

    - name: Run tests
      run: bun test
      shell: bash
    
    - name: Run project
      run: bun index.ts 
      shell: bash